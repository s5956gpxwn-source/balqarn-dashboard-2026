<style>
html{scroll-behavior:smooth;}
*:focus{outline:none;}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible,label:focus-visible,.kpi:focus-visible,.proj-card:focus-visible,.d-row:focus-visible,.bar-item:focus-visible{outline:2px solid var(--advanced);outline-offset:2px;border-radius:6px;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important;}
  html{scroll-behavior:auto!important;}
}
:root{--tr:all .35s ease;}
body.light{--overlay-bg:rgba(57,32,21,.55);--bg:#F2E7DE;--bg2:#E5CFBD;--glass:rgba(255,255,255,0.55);--glass2:rgba(255,255,255,0.82);--gborder:rgba(57,32,21,0.13);--gborder2:rgba(57,32,21,0.28);--text:#392015;--text2:#614C44;--text3:#887973;--text4:#C4BCB9;--advanced:#007B69;--advancedt:rgba(0,123,105,0.12);--regular:#66B0A5;--regulart:rgba(102,176,165,0.12);--pending:#A37956;--pendingt:rgba(163,121,86,0.12);--stopped:#E3A778;--stoppedt:rgba(227,167,120,0.12);--late:#E0C5C9;--latet:rgba(224,197,201,0.12);--stalled:#973D4B;--stalledt:rgba(151,61,75,0.12);--preceipt:#D4AF91;--preceiptt:rgba(212,175,145,0.12);--shadow:rgba(57,32,21,0.10);--sig-filter:brightness(0) sepia(1) saturate(2) hue-rotate(340deg) brightness(0.4);--sig-op:0.55;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;}
body.locked{overflow:hidden;height:100vh;}
.orn-bar{width:100%;overflow:hidden;display:flex;align-items:center;}
.orn-bar img{width:100%;height:100%;object-fit:cover;display:block;}
header{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--gborder);box-shadow:0 4px 24px var(--shadow);transition:var(--tr);}
.hdr{padding:10px 28px;display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;flex-direction:row;align-items:center;gap:12px;}
.logo-img{height:80px;width:auto;object-fit:contain;}
.hdr-title p{font-size:18px;color:var(--text3);font-weight:800;margin:0;}
.hdr-actions{display:flex;align-items:center;gap:10px;}
.export-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--gborder2);background:var(--glass);backdrop-filter:blur(10px);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;}
.export-btn:hover{background:var(--advanced);color:white;border-color:var(--advanced);}
main{padding:20px 28px 0;max-width:1440px;margin:0 auto;}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.kpi{border-radius:16px;padding:16px 18px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--gborder);}
.kpi:hover{transform:translateY(-3px);box-shadow:0 14px 32px var(--shadow);background:var(--glass2);border-color:var(--gborder2);}
.kpi.active-f{border-color:var(--gborder2);box-shadow:0 0 0 2px var(--gborder2);}
.kpi-orn{position:absolute;bottom:6px;left:6px;width:52px;height:52px;object-fit:contain;opacity:.12;pointer-events:none;transition:opacity .3s,transform .4s;}
body.dark .kpi-orn,body.dark .card-orn,body.dark .chart-orn,body.dark .dp-head-orn,body.dark .dp-section-orn,body.dark .login-orn{filter:brightness(0) invert(1) sepia(1) saturate(0.3) hue-rotate(340deg) brightness(1.8);opacity:.10;}
body.dark .kpi:hover .kpi-orn{opacity:.20;}
body.dark .proj-card:hover .card-orn{opacity:.18;transform:translate(-50%,-50%) scale(1.08) rotate(-4deg);}
body.dark .chart-card:hover .chart-orn{opacity:.18;transform:translate(-50%,-50%) scale(1.08) rotate(-4deg);}
.kpi:hover .kpi-orn{opacity:.22;transform:scale(1.08) rotate(-4deg);}
.kpi.active-f .kpi-orn{opacity:.20;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.kpi-all::before{background:var(--text3);}.kpi-advanced::before{background:var(--advanced);}.kpi-regular::before{background:var(--regular);}.kpi-pending::before{background:var(--pending);}.kpi-stopped::before{background:var(--stopped);}.kpi-late::before{background:var(--late);}.kpi-stalled::before{background:var(--stalled);}.kpi-preceipt::before{background:var(--preceipt);}.kpi-value::before{background:var(--text3);}
.kpi-val{font-size:30px;font-weight:900;color:var(--text);line-height:1;margin-bottom:4px;position:relative;z-index:1;}
.kpi-val.money{font-size:18px;}
.kpi-lbl{font-size:11px;color:var(--text3);position:relative;z-index:1;}
.kpi-sub{font-size:11px;margin-top:8px;font-weight:800;position:relative;z-index:1;}
.cadv{color:var(--advanced);}.creg{color:var(--regular);}.cp{color:var(--pending);}.cstp{color:var(--stopped);}.clat{color:var(--late);}.cstl{color:var(--stalled);}.cpre{color:var(--preceipt);}.cx{color:var(--text3);}
.alert-banner{background:var(--stalledt);border:1px solid rgba(151,61,75,.35);border-radius:12px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{font-size:12px;color:var(--stalled);font-weight:600;line-height:1.7;}
.alert-text strong{font-size:13px;display:block;margin-bottom:2px;}
.charts-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;margin-bottom:16px;}
.chart-card{border-radius:16px;padding:14px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--gborder);transition:var(--tr);position:relative;overflow:hidden;}
.chart-orn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;object-fit:contain;opacity:.08;pointer-events:none;transition:opacity .3s,transform .4s;}
.chart-card:hover .chart-orn{opacity:.14;transform:translate(-50%,-50%) scale(1.08) rotate(-4deg);}
.chart-title{font-size:11px;font-weight:800;color:var(--text3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--gborder);letter-spacing:.6px;text-transform:uppercase;}
.donut-wrap{display:flex;align-items:flex-start;gap:12px;}
svg.donut{flex-shrink:0;transform:rotate(-90deg);}
.d-legend{flex:1;display:flex;flex-direction:column;gap:2px;}
.d-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;cursor:pointer;padding:3px 6px;border-radius:7px;transition:background .2s;}
.d-row:hover{background:var(--glass2);}
.d-row.sel{background:var(--glass2);border:1px solid var(--gborder);}
.d-left{display:flex;align-items:center;gap:6px;}
.d-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.d-name{color:var(--text2);}
.d-cnt{font-weight:900;font-size:13px;}
.bar-wrap{display:flex;flex-direction:column;gap:6px;position:relative;padding:4px 0;}
.bar-item{display:flex;align-items:center;gap:10px;cursor:pointer;padding:3px 6px;border-radius:8px;transition:background .2s;}
.bar-item:hover{background:var(--glass2);}
.bar-lbl{font-size:11px;color:var(--text2);font-weight:600;min-width:180px;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:18px;background:var(--glass);border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;transition:width .8s ease;min-width:2px;}
.bar-pct{font-size:11px;font-weight:800;color:var(--text2);min-width:36px;text-align:left;}
.orn-div{display:flex;align-items:center;gap:10px;margin:14px 0;}
.orn-div-line{flex:1;height:1px;background:var(--gborder);}
.orn-icon{width:22px;height:22px;object-fit:contain;opacity:.22;flex-shrink:0;}
body.light .orn-icon{filter:none;opacity:.25;}
body.dark{--overlay-bg:rgba(0,0,0,.65);--bg:#1A120E;--bg2:#241A14;--glass:rgba(35,25,18,0.65);--glass2:rgba(45,32,24,0.82);--gborder:rgba(210,190,170,0.13);--gborder2:rgba(210,190,170,0.28);--text:#F2E7DE;--text2:#D4C4B8;--text3:#A89888;--text4:#6B5B50;--advanced:#00B89A;--advancedt:rgba(0,184,154,0.15);--regular:#7DC8BD;--regulart:rgba(125,200,189,0.15);--pending:#C89A6F;--pendingt:rgba(200,154,111,0.15);--stopped:#F0BF96;--stoppedt:rgba(240,191,150,0.15);--late:#E8D5DA;--latet:rgba(232,213,218,0.15);--stalled:#C96070;--stalledt:rgba(201,96,112,0.15);--preceipt:#E0C4A6;--preceiptt:rgba(224,196,166,0.15);--shadow:rgba(0,0,0,0.30);--sig-filter:brightness(0) invert(1) sepia(1) saturate(0.5) hue-rotate(340deg) brightness(0.9);--sig-op:0.45;}
body.dark .orn-icon{filter:brightness(0) invert(1) sepia(1) saturate(0.3) hue-rotate(340deg) brightness(1.8);opacity:.25;}
body.dark .orn-bar img{filter:brightness(0) invert(1) sepia(1) saturate(0.3) hue-rotate(340deg) brightness(1.8);opacity:.15;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;}
.cnt-badge{background:var(--glass2);border:1px solid var(--gborder);color:var(--text3);font-size:11px;padding:2px 9px;border-radius:10px;font-weight:700;}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;display:flex;align-items:center;}
.search-icon{position:absolute;right:10px;color:var(--text4);font-size:13px;pointer-events:none;transition:color .2s;}
.search-input{padding:6px 14px 6px 14px;padding-right:32px;border-radius:8px;border:1px solid var(--gborder);background:var(--glass);backdrop-filter:blur(8px);color:var(--text);font-size:11px;font-family:inherit;font-weight:600;outline:none;transition:border-color .2s;width:180px;}
.search-input:focus{border-color:var(--advanced);}
.search-input:focus+.search-icon{color:var(--advanced);}
.search-input::placeholder{color:var(--text4);}
.search-clear{position:absolute;left:8px;background:none;border:none;color:var(--text4);font-size:14px;cursor:pointer;padding:2px 4px;display:none;font-family:inherit;transition:color .2s;}.search-clear:hover{color:var(--stalled);}
.fbtn{background:var(--glass);border:1px solid var(--gborder);backdrop-filter:blur(8px);color:var(--text3);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;}
.fbtn:hover{border-color:var(--gborder2);color:var(--text);}
.fbtn.active{background:var(--advanced);border-color:var(--advanced);color:white;box-shadow:0 4px 12px rgba(0,123,105,.3);}
.sort-btn.active{background:var(--pending);border-color:var(--pending);color:white;box-shadow:0 4px 12px rgba(163,121,86,.3);}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.proj-card{border-radius:16px;padding:18px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;animation:fadeIn .4s ease both;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--gborder);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.proj-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px var(--shadow);background:var(--glass2);border-color:var(--gborder2);}
.card-orn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;object-fit:contain;opacity:.08;pointer-events:none;transition:opacity .3s,transform .4s;}
.proj-card:hover .card-orn{opacity:.14;transform:translate(-50%,-50%) scale(1.08) rotate(-4deg);}
.card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.s-advanced{background:var(--advanced);}.s-regular{background:var(--regular);}.s-pending{background:var(--pending);}.s-stopped{background:var(--stopped);}.s-late{background:var(--late);}.s-stalled{background:var(--stalled);}.s-preceipt{background:var(--preceipt);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.4;flex:1;margin-left:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;word-break:break-word;}
.sbadge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.b-advanced{background:var(--advancedt);color:var(--advanced);border:1px solid rgba(0,123,105,.22);}
.b-regular{background:var(--regulart);color:var(--regular);border:1px solid rgba(102,176,165,.22);}
.b-pending{background:var(--pendingt);color:var(--pending);border:1px solid rgba(163,121,86,.22);}
.b-stopped{background:var(--stoppedt);color:var(--stopped);border:1px solid rgba(227,167,120,.22);}
.b-late{background:var(--latet);color:var(--late);border:1px solid rgba(224,197,201,.22);}
.b-stalled{background:var(--stalledt);color:var(--stalled);border:1px solid rgba(151,61,75,.22);}
.b-preceipt{background:var(--preceiptt);color:var(--preceipt);border:1px solid rgba(212,175,145,.22);}
.card-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.mrow{display:flex;align-items:center;justify-content:space-between;}
.mkey{font-size:10px;color:var(--text4);}
.mval{font-size:11px;color:var(--text2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.mval.big{font-size:13px;color:var(--text);font-weight:800;}
.prog-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.prog-lbl{font-size:10px;color:var(--text4);}
.prog-pct{font-size:18px;font-weight:900;}
.pct-advanced{color:var(--advanced);}.pct-regular{color:var(--regular);}.pct-pending{color:var(--pending);}.pct-stopped{color:var(--stopped);}.pct-late{color:var(--late);}.pct-stalled{color:var(--stalled);}.pct-preceipt{color:var(--preceipt);}
.prog-track{height:5px;background:var(--gborder);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;transition:width 1s ease;}
.f-advanced{background:var(--advanced);}.f-regular{background:var(--regular);}.f-pending{background:var(--pending);}.f-stopped{background:var(--stopped);}.f-late{background:var(--late);}.f-stalled{background:var(--stalled);}.f-preceipt{background:var(--preceipt);}
.card-alert{margin-top:10px;background:var(--stalledt);border:1px solid rgba(151,61,75,.25);border-radius:8px;padding:7px 10px;font-size:10px;color:var(--stalled);font-weight:600;line-height:1.5;}
footer{margin-top:40px;}
.footer-sig{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 28px 10px;color:var(--text3);font-size:12px;font-weight:700;}
.sig-img{height:38px;width:auto;filter:var(--sig-filter);opacity:var(--sig-op);transition:var(--tr);}
.footer-copy{font-size:9px;color:var(--text4);text-align:center;padding:8px 20px 18px;line-height:1.6;max-width:1200px;margin:0 auto;}
.overlay{position:fixed;inset:0;background:var(--overlay-bg,rgba(57,32,21,.55));backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.detail-panel{background:var(--bg);border:1px solid var(--gborder2);border-radius:22px;width:92%;max-width:680px;max-height:92vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(14px);transition:transform .3s;}
.overlay.open .detail-panel{transform:translateY(0);}
.dp-head{padding:22px 26px 14px;border-bottom:1px solid var(--gborder);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--bg);backdrop-filter:blur(20px);z-index:10;overflow:hidden;}
.dp-head-orn{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:80px;height:80px;object-fit:contain;opacity:.08;pointer-events:none;transition:opacity .3s,transform .4s;}
.dp-head:hover .dp-head-orn{opacity:.14;transform:translateX(-50%) scale(1.08) rotate(-4deg);}
.dp-name{font-size:15px;font-weight:900;color:var(--text);flex:1;line-height:1.4;}
.btn-close{background:var(--glass2);border:1px solid var(--gborder);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.dp-body{padding:18px 26px 26px;display:flex;flex-direction:column;gap:14px;}
.dp-prog{background:var(--glass);border:1px solid var(--gborder);border-radius:14px;padding:14px;position:relative;overflow:hidden;}
.dp-prog-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.dp-prog-pct{font-size:38px;font-weight:900;}
.dp-phase{font-size:11px;color:var(--text3);}
.dp-track{height:10px;background:var(--gborder);border-radius:10px;overflow:hidden;}
.dp-fill{height:100%;border-radius:10px;transition:width 1s ease;}
.dp-action{background:var(--stalledt);border:1px solid rgba(151,61,75,.3);border-radius:12px;padding:14px 16px;}
.dp-action-lbl{font-size:10px;color:var(--stalled);font-weight:800;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.dp-action-txt{font-size:13px;color:var(--text);font-weight:600;line-height:1.6;}
.dp-section{position:relative;overflow:hidden;}
.dp-section-orn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;object-fit:contain;opacity:.07;pointer-events:none;transition:opacity .3s,transform .4s;}
.dp-prog:hover .dp-section-orn,.dp-section:hover .dp-section-orn{opacity:.13;transform:translate(-50%,-50%) scale(1.08) rotate(-4deg);}
.dp-section-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gborder);}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dp-item{background:var(--glass);border:1px solid var(--gborder);border-radius:11px;padding:12px;position:relative;overflow:hidden;}
.dp-item.full{grid-column:1/-1;}
.di-lbl{font-size:10px;color:var(--text4);margin-bottom:3px;font-weight:600;}
.di-val{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;}
.di-val.small{font-size:11px;}
.dp-letters{background:var(--glass);border:1px solid var(--gborder);border-radius:11px;padding:14px;font-size:11px;color:var(--text2);line-height:1.9;}
.dates-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

function escapeHtml(t){if(t==null)return '';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ─── مودال مخصص: بديل لـ alert/confirm/prompt ───
let _mxResolve=null;
function _mxClose(value){
  const ov=document.getElementById('mxOverlay');
  if(ov)ov.classList.remove('open');
  const r=_mxResolve;_mxResolve=null;
  if(r)r(value);
}
function _mxOpen(opts){
  // opts: {title, msg, buttons:[{label,value,kind}], inputDefault?}
  return new Promise(resolve=>{
    // إغلاق أي مودال سابق مفتوح
    if(_mxResolve){const r=_mxResolve;_mxResolve=null;try{r(null);}catch(e){}}
    _mxResolve=resolve;
    const ov=document.getElementById('mxOverlay');
    document.getElementById('mxTitle').textContent=opts.title||'';
    const msgEl=document.getElementById('mxMsg');
    msgEl.innerHTML='';
    const msgP=document.createElement('div');msgP.textContent=opts.msg||'';msgEl.appendChild(msgP);
    let inputEl=null;
    if(opts.input){
      inputEl=document.createElement('input');inputEl.type='text';inputEl.className='mx-input';inputEl.value=opts.inputDefault||'';
      msgEl.appendChild(inputEl);
    }
    const acts=document.getElementById('mxActions');
    acts.innerHTML='';
    (opts.buttons||[{label:'موافق',value:true,kind:'primary'}]).forEach(b=>{
      const btn=document.createElement('button');
      btn.className='mx-btn'+(b.kind?' '+b.kind:'');
      btn.textContent=b.label;
      btn.onclick=()=>{
        if(inputEl&&b.value!==false&&b.value!==null)_mxClose(inputEl.value);
        else _mxClose(b.value);
      };
      acts.appendChild(btn);
    });
    ov.classList.add('open');
    setTimeout(()=>{(inputEl||acts.querySelector('.mx-btn.primary')||acts.querySelector('.mx-btn'))?.focus();},50);
  });
}
function showAlert(msg,title){
  return _mxOpen({title:title||'تنبيه',msg,buttons:[{label:'موافق',value:true,kind:'primary'}]});
}
function showConfirm(msg,opts){
  opts=opts||{};
  return _mxOpen({
    title:opts.title||'تأكيد',
    msg,
    buttons:[
      {label:opts.okLabel||'نعم',value:true,kind:opts.danger?'danger':'primary'},
      {label:opts.cancelLabel||'إلغاء',value:false}
    ]
  });
}

// ─── تحميل المشاريع من Firestore ───
async function loadProjects(){
  try{
    const snapshot=await getDocs(collection(db,'projects'));
    projects=snapshot.docs.map(d=>{const data=d.data();return{...data,id:Number(d.id)||d.id};});
    projects.sort((a,b)=>a.id-b.id);
    try{const md=await getDoc(doc(db,'meta','lastUpdate'));if(md.exists()){const ts=md.data().timestamp;localStorage.setItem('lastUpdate',ts);showLastUpdate(ts);}}catch(e){}
  }catch(e){projects=[];}
}

window.doLogin=async function(){
  const email=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  if(!email||!pass){err.textContent='يرجى إدخال البريد الإلكتروني وكلمة المرور';return;}
  // فحص مبدئي للبريد لتقليل ضربات السيرفر
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='صيغة البريد الإلكتروني غير صحيحة';return;}
  try{
    err.textContent='جاري تسجيل الدخول...';
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    // رسالة عامة دائماً — لا نكشف ما إذا كان البريد موجوداً
    console.error('Login failed',e&&e.code);
    err.textContent='البريد الإلكتروني أو كلمة المرور غير صحيحة';
  }
};

function applyLogin(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('loginUser').disabled=true;
  document.getElementById('loginPass').disabled=true;
  document.body.classList.remove('locked');
  window.scrollTo(0,0);
  document.getElementById('userBadge').textContent=currentUser.welcome||currentUser.name;
  document.getElementById('userBadge').className=currentUser.role==='admin'?'user-badge':'welcome-msg';
  if(currentUser.role==='admin'){
    document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
  }else{
    document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');
  }
}

// ─── مراقبة حالة المصادقة ───
onAuthStateChanged(auth,async(user)=>{
  const loader=document.getElementById('authLoading');
  if(user){
    // عرض فوري من الكاش (بالدور المخزّن) — الحماية الحقيقية من Firestore Rules
    let cachedProjectsSnap=null;
    let cachedRole=null;
    const cachedUser=localStorage.getItem('cachedUser');
    const cachedProjects=localStorage.getItem('cachedProjects');
    if(cachedUser&&cachedProjects){
      try{
        const parsed=JSON.parse(cachedUser);
        currentUser={...parsed};
        cachedRole=parsed.role;
        projects=JSON.parse(cachedProjects);
        cachedProjectsSnap=cachedProjects;
        await loadHiddenFields();
        applyLogin();
        renderAll();
        loader.classList.add('hidden');
      }catch(e){console.warn('cache restore failed',e);}
    }
    // تحديث من Firestore في الخلفية — لا نعيد الرسم إلا لو فعلاً تغيّر شيء
    try{
      const userDoc=await getDoc(doc(db,'users',user.uid));
      let newUser;
      if(userDoc.exists()){
        const ud=userDoc.data();
        newUser={username:user.email,name:ud.name,welcome:ud.welcome,role:ud.role};
        if(ud.theme&&!document.body.classList.contains(ud.theme))setTheme(ud.theme);
        if(ud.printSettings){_printSettings=ud.printSettings;try{localStorage.setItem('printSettings',JSON.stringify(ud.printSettings));}catch(e){}}
      }else{
        newUser={username:user.email,name:user.email,welcome:'مرحباً',role:'viewer'};
      }
      const roleChanged=cachedRole!==newUser.role;
      currentUser=newUser;
      try{localStorage.setItem('cachedUser',JSON.stringify(currentUser));}catch(e){}
      await loadProjects();
      await loadHiddenFields();
      const newProjectsSnap=JSON.stringify(projects);
      try{localStorage.setItem('cachedProjects',newProjectsSnap);}catch(e){}
      // أعد الرسم فقط لو:
      // (1) لم يكن هناك كاش معروض، أو
      // (2) تغيّر الدور، أو
      // (3) تغيّرت بيانات المشاريع
      if(!cachedProjectsSnap||roleChanged||newProjectsSnap!==cachedProjectsSnap){
        applyLogin();
        renderAll();
      }
    }catch(e){console.warn('firestore refresh failed',e);}
  }else{
    localStorage.removeItem('cachedUser');
    localStorage.removeItem('cachedProjects');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.body.classList.add('locked');
  }
  loader.classList.add('hidden');
});

function renderDonut(){
  const total=projects.length||1;
  const cnt={advanced:0,regular:0,pending:0,stopped:0,late:0,stalled:0,preceipt:0};
  projects.forEach(p=>{if(cnt.hasOwnProperty(p.status))cnt[p.status]++;});
  const statKeys=['advanced','regular','pending','stopped','late','stalled','preceipt'];
  const cx=90,cy=90,R=85,ri=53,sw=32;
  let paths='';
  let cum=0;
  function arcPath(cx,cy,R,ri,startA,endA){
    const s1=startA*Math.PI/180,s2=endA*Math.PI/180;
    const x1=cx+R*Math.cos(s1),y1=cy+R*Math.sin(s1);
    const x2=cx+R*Math.cos(s2),y2=cy+R*Math.sin(s2);
    const x3=cx+ri*Math.cos(s2),y3=cy+ri*Math.sin(s2);
    const x4=cx+ri*Math.cos(s1),y4=cy+ri*Math.sin(s1);
    const big=endA-startA>180?1:0;
    return `M${x1},${y1} A${R},${R} 0 ${big} 1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 ${big} 0 ${x4},${y4} Z`;
  }
  statKeys.forEach(s=>{
    if(cnt[s]===0)return;
    const pct=cnt[s]/total;
    const startA=cum*360-90;
    const endA=(cum+pct)*360-90;
    paths+=`<path data-status="${s}" d="${arcPath(cx,cy,R,ri,startA,endA)}" fill="${COLORS[s]}" style="cursor:pointer;transition:opacity .2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1"/>`;
    cum+=pct;
  });
  if(cum===0)paths=`<circle cx="${cx}" cy="${cy}" r="${(R+ri)/2}" fill="none" stroke="var(--gborder)" stroke-width="${R-ri}"/>`;
  document.getElementById('donutSvg').innerHTML=paths;
  // Tooltip
  const svg=document.getElementById('donutSvg');
  const tooltip=document.getElementById('donutTooltip');
  svg.addEventListener('mousemove',function(e){
    const el=e.target.closest('[data-status]');
    if(el){
      const s=el.dataset.status;
      const pct=((cnt[s]/total)*100).toFixed(1);
      tooltip.innerHTML=`<span style="color:${COLORS[s]}">●</span> ${LABELS[s]}: ${cnt[s]} (${pct}%)`;
      tooltip.style.display='block';
      const card=svg.closest('.chart-card');
      const cardRect=card.getBoundingClientRect();
      const tipW=tooltip.offsetWidth,tipH=tooltip.offsetHeight;
      let left=e.clientX-cardRect.left+12;
      let top=e.clientY-cardRect.top-32;
      left=Math.max(4,Math.min(left,cardRect.width-tipW-4));
      top=Math.max(4,Math.min(top,cardRect.height-tipH-4));
      tooltip.style.left=left+'px';
      tooltip.style.top=top+'px';
    }else{tooltip.style.display='none';}
  });
  svg.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
  svg.addEventListener('click',function(e){
    const el=e.target.closest('[data-status]');
    if(el)setFilterFromKPI(el.dataset.status);
  });
  document.getElementById('donutLegend').innerHTML=
    `<div class="d-row ${filter==='all'?'sel':''}" onclick="setFilterFromKPI('all')">
      <div class="d-left"><div class="d-dot" style="background:var(--text3)"></div><span class="d-name">الكل</span></div>
      <span class="d-cnt" style="color:var(--text2)">${projects.length}</span>
    </div>`+
    statKeys.map(s=>`
      <div class="d-row ${filter===s?'sel':''}" onclick="setFilterFromKPI('${s}')">
        <div class="d-left"><div class="d-dot" style="background:${COLORS[s]}"></div><span class="d-name">${LABELS[s]}</span></div>
        <span class="d-cnt" style="color:${COLORS[s]}">${cnt[s]}</span>
      </div>`).join('');
}

let _searchTimer=null;
function handleSearch(q){
  // إظهار زر المسح فوراً (بدون انتظار)
  document.getElementById('searchClear').style.display=q.trim()?'block':'none';
  // تأخير الفلترة الفعلية لتحسين الأداء
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{searchQuery=q.trim();renderGrid();},150);
}

function setSort(field,btn){if(sortBy===field){sortDir*=-1;}else{sortBy=field;sortDir=field==='id'?1:-1;}document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');btn.textContent=btn.textContent.replace(/ [▲▼]/,'')+(field==='id'?'':sortDir>0?' ▲':' ▼');renderAll();}

function renderGrid(){
  let filtered=filter==='all'?projects:projects.filter(p=>p.status===filter);
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.contractor||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)||(p.pm||'').toLowerCase().includes(q)||(p.contract_no||'').toLowerCase().includes(q));}
  if(sortBy!=='id'){filtered.sort((a,b)=>{let av=a[sortBy],bv=b[sortBy];if(sortBy==='date_end'){av=av||'';bv=bv||'';return sortDir*(av<bv?-1:av>bv?1:0);}return sortDir*((av||0)-(bv||0));});}
  document.getElementById('projCount').textContent=filtered.length;
  document.getElementById('projGrid').innerHTML=filtered.length
    ?filtered.map((p,i)=>{
        const orn=CARD_ORNS[i%CARD_ORNS.length];
        return `<div class="proj-card" onclick="openDetail(${p.id})" style="animation-delay:${i*.04}s">
          <div class="card-stripe s-${p.status}"></div>

// زر قفل صغير بجانب كل حقل — يظهر للأدمن فقط
// يحوّل الحقل بين مخفي/ظاهر للمستخدمين العاديين
const LOCK_SVG_OPEN='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V4.5a3 3 0 0 1 6 0V5"/></svg>';
const LOCK_SVG_CLOSED='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V4.5a3 3 0 0 1 6 0V7"/></svg>';
function lockBtn(label){
  if(!currentUser||currentUser.role!=='admin')return '';
  const isHidden=hiddenFields.includes(label);
  const safe=label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const title=isHidden?'مخفي عن المستخدمين — اضغط للإظهار':'ظاهر — اضغط للإخفاء عن المستخدمين';
  return `<button type="button" class="field-lock${isHidden?' locked':''}" data-pf-lock="${escapeHtml(label)}" onclick="event.stopPropagation();quickToggleHide('${safe}')" title="${title}" aria-label="${title}">${isHidden?LOCK_SVG_CLOSED:LOCK_SVG_OPEN}</button>`;
}

async function quickToggleHide(field){
  if(!currentUser||currentUser.role!=='admin')return;
  const nowHidden=!hiddenFields.includes(field);
  if(nowHidden)hiddenFields.push(field);
  else hiddenFields=hiddenFields.filter(f=>f!==field);
  // تحديث فوري للأزرار المعنية بهذا الحقل فقط (بدون إعادة بناء DOM)
  document.querySelectorAll('.field-lock').forEach(btn=>{
    if(btn.getAttribute('data-pf-lock')===field){
      btn.classList.toggle('locked',nowHidden);
      btn.innerHTML=nowHidden?LOCK_SVG_CLOSED:LOCK_SVG_OPEN;
      const t=nowHidden?'مخفي عن المستخدمين — اضغط للإظهار':'ظاهر — اضغط للإخفاء عن المستخدمين';
      btn.title=t;btn.setAttribute('aria-label',t);
    }
  });
  // حفظ في الخلفية
  try{await setDoc(doc(db,'meta','hiddenFields'),{fields:hiddenFields});}
  catch(e){console.error('quickToggleHide save',e);
    // تراجع في حال الفشل
    if(nowHidden)hiddenFields=hiddenFields.filter(f=>f!==field);
    else hiddenFields.push(field);
    document.querySelectorAll('.field-lock').forEach(btn=>{
      if(btn.getAttribute('data-pf-lock')===field){
        btn.classList.toggle('locked',!nowHidden);
        btn.innerHTML=!nowHidden?LOCK_SVG_CLOSED:LOCK_SVG_OPEN;
      }
    });
    showAlert('تعذّر حفظ الإعداد. تحقق من الاتصال.');
  }
}
window.quickToggleHide=quickToggleHide;

// زر نسخ صغير يظهر عند hover
const COPY_SVG='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11V3.5A1.5 1.5 0 0 1 4.5 2H11"/></svg>';
const CHECK_SVG='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5L6.5 12L13 4.5"/></svg>';
function copyBtn(rawVal){
  if(rawVal==null||rawVal==='')return '';
  // نخزّن القيمة كـ base64 في data-copy لتجنب مشاكل الاقتباس
  let encoded='';
  try{encoded=btoa(unescape(encodeURIComponent(String(rawVal))));}catch(e){encoded='';}
  return `<button type="button" class="copy-btn" data-copy="${encoded}" onclick="event.stopPropagation();copyFieldValue(this)" title="نسخ" aria-label="نسخ">${COPY_SVG}</button>`;
}
function copyFieldValue(btn){
  try{
    const raw=btn.getAttribute('data-copy')||'';
    const val=decodeURIComponent(escape(atob(raw)));
    const write=navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(val):Promise.reject('no clipboard');
    write.then(()=>{
      btn.classList.add('copied');btn.innerHTML=CHECK_SVG;
      const toast=document.getElementById('copyToast');if(toast){toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400);}
      setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=COPY_SVG;},1200);
    }).catch(()=>{
      // Fallback: تحديد النص يدوياً
      const ta=document.createElement('textarea');ta.value=val;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
      const toast=document.getElementById('copyToast');if(toast){toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400);}
    });
  }catch(e){console.error('copyFieldValue',e);}
}
window.copyFieldValue=copyFieldValue;

  const tmp=document.createElement('div');tmp.innerHTML=String(s);

// ─── إعدادات طباعة مشروع واحد ───
// مجموعة الحقول المستثناة من الطباعة. تُحفظ خلال جلسة الإعدادات فقط.
const _printDetailExcluded=new Set();
let _printDetailInitialized=false;

// يقرأ قائمة حقول المشروع من لوحة التفاصيل (بعد إعادة رسمها)
function _getProjectFields(id){
  openDetail(id);
  const panel=document.getElementById('detailPanel');
  const all=Array.from(panel.querySelectorAll('[data-pf]')).map(el=>el.getAttribute('data-pf'));
  const seen=new Set();const fields=[];
  all.forEach(f=>{if(!seen.has(f)){seen.add(f);fields.push(f);}});
  return fields;
}

function openProjectPrintSettings(id){
  if(!currentUser||currentUser.role!=='admin')return;
  const p=projects.find(x=>x.id===id);if(!p)return;
  const fields=_getProjectFields(id);
  if(!fields.length){showAlert('لا توجد بيانات قابلة للطباعة في هذا المشروع');return;}
  // تهيئة الافتراضي: عند أول فتح، المخفي غير محدد (أي في الاستثناءات)
  if(!_printDetailInitialized){
    _printDetailExcluded.clear();
    fields.forEach(f=>{if(hiddenFields.includes(f))_printDetailExcluded.add(f);});
    _printDetailInitialized=true;
  }
  const selectedCount=fields.filter(f=>!_printDetailExcluded.has(f)).length;
  const panel=document.getElementById('detailPanel');
  const actionBtn=(txt,fn,primary)=>`<button onclick="${fn}" style="padding:6px 12px;border-radius:8px;border:1px solid ${primary?'var(--advanced)':'var(--gborder2)'};background:${primary?'var(--advancedt)':'var(--glass)'};color:${primary?'var(--advanced)':'var(--text2)'};font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;flex:1;min-width:120px;">${txt}</button>`;
  panel.innerHTML=`
    <div class="dp-head">
      <div>
        <div class="dp-name">إعدادات طباعة المشروع</div>
        <div style="margin-top:4px;font-size:11px;color:var(--text3)">${escapeHtml(p.name)}</div>
        <div style="margin-top:4px;font-size:10px;color:var(--text3)">افتراضياً: المخفية مستثناة. خصّص الاختيار كما تريد.</div>
      </div>
      <div class="dp-head-actions">
        <button class="btn-close" onclick="cancelProjectPrintSettings(${p.id})">&#x2715;</button>
      </div>
    </div>
    <div class="dp-body">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        ${actionBtn('&#9745; تحديد الكل','selectAllProjectPrintFields('+p.id+')',false)}
        ${actionBtn('&#9744; إلغاء الكل','clearAllProjectPrintFields('+p.id+')',false)}
        ${actionBtn('&#128274; المخفي فقط','selectOnlyHiddenProjectPrintFields('+p.id+')',false)}
        ${actionBtn('&#128275; غير المخفي فقط','selectOnlyVisibleProjectPrintFields('+p.id+')',true)}
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:700;">محدّد: ${selectedCount} من ${fields.length}</div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${fields.map(f=>{const checked=!_printDetailExcluded.has(f);const isHidden=hiddenFields.includes(f);return `
          <label style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:${isHidden?'var(--stalledt)':'var(--glass)'};border:1px solid ${isHidden?'rgba(151,61,75,.3)':'var(--gborder)'};border-radius:8px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;">
            <input type="checkbox" ${checked?'checked':''} onchange="toggleProjectPrintField('${f.replace(/'/g,"\\'")}',this.checked,${p.id})" style="width:15px;height:15px;accent-color:var(--advanced);cursor:pointer;">
            <span style="flex:1">${escapeHtml(f)}</span>
            ${isHidden?'<span style="font-size:9px;color:var(--stalled);font-weight:700">&#128274; مخفي</span>':''}
          </label>`;}).join('')}
      </div>
      <div class="dp-form-actions">
        <button class="dp-save-btn" onclick="confirmProjectPrint(${p.id})">&#9113; طباعة الآن</button>
        <button class="dp-cancel-btn" onclick="cancelProjectPrintSettings(${p.id})">إلغاء</button>
      </div>
    </div>`;
  panel.scrollTop=0;
}

function toggleProjectPrintField(field,on,id){
  if(on)_printDetailExcluded.delete(field);
  else _printDetailExcluded.add(field);
  const panel=document.getElementById('detailPanel');const sp=panel.scrollTop;
  openProjectPrintSettings(id);panel.scrollTop=sp;
}

function selectAllProjectPrintFields(id){
  _printDetailExcluded.clear();
  openProjectPrintSettings(id);
}

function clearAllProjectPrintFields(id){
  const fields=_getProjectFields(id);
  _printDetailExcluded.clear();
  fields.forEach(f=>_printDetailExcluded.add(f));
  openProjectPrintSettings(id);
}

function selectOnlyHiddenProjectPrintFields(id){
  const fields=_getProjectFields(id);
  _printDetailExcluded.clear();
  fields.forEach(f=>{if(!hiddenFields.includes(f))_printDetailExcluded.add(f);});
  openProjectPrintSettings(id);
}

function selectOnlyVisibleProjectPrintFields(id){
  const fields=_getProjectFields(id);
  _printDetailExcluded.clear();
  fields.forEach(f=>{if(hiddenFields.includes(f))_printDetailExcluded.add(f);});
  openProjectPrintSettings(id);
}

function confirmProjectPrint(id){
  // أعد رسم تفاصيل المشروع ثم اطبع (printDetail يفلتر بـ _printDetailExcluded)
  openDetail(id);
  setTimeout(()=>{printDetail();_printDetailInitialized=false;},150);
}

function cancelProjectPrintSettings(id){
  _printDetailInitialized=false;
  openDetail(id);
}

window.openProjectPrintSettings=openProjectPrintSettings;

window.selectAllProjectPrintFields=selectAllProjectPrintFields;

window.selectOnlyHiddenProjectPrintFields=selectOnlyHiddenProjectPrintFields;
window.selectOnlyVisibleProjectPrintFields=selectOnlyVisibleProjectPrintFields;
window.confirmProjectPrint=confirmProjectPrint;
window.cancelProjectPrintSettings=cancelProjectPrintSettings;

function getPrintSettings(){if(_printSettings)return _printSettings;try{const s=JSON.parse(localStorage.getItem('printSettings'));if(s&&s.cols){_printSettings=s;return s;}}catch(e){}return{cols:{},order:[]};}
async function savePrintSettings(settings){_printSettings=settings;try{localStorage.setItem('printSettings',JSON.stringify(settings));}catch(e){}if(auth.currentUser){try{await setDoc(doc(db,'users',auth.currentUser.uid),{printSettings:settings},{merge:true});}catch(e){}}}

function getOrderedCols(){
  const s=getPrintSettings();const order=s.order||[];
  const all=PRINT_COLS.map(c=>({...c,on:s.cols.hasOwnProperty(c.key)?s.cols[c.key]:c.on}));
  if(order.length){const map={};all.forEach(c=>{map[c.key]=c;});const ordered=[];order.forEach(k=>{if(map[k]){ordered.push(map[k]);delete map[k];}});Object.values(map).forEach(c=>ordered.push(c));return ordered;}
  return all;
}

// تحويل أي صيغة تاريخ للصيغة القياسية YYYY-MM-DD التي يقبلها <input type="date">
function _toIsoDate(v){
  if(!v)return '';
  const s=String(v).trim();
  // بالفعل ISO
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // صيغ شائعة: YYYY/MM/DD أو DD/MM/YYYY أو DD-MM-YYYY
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  // Excel serial
  const n=Number(s);
  if(!isNaN(n)&&n>20000&&n<80000){const d=new Date((n-25569)*86400000);if(!isNaN(d))return d.toISOString().slice(0,10);}
  return s; // غير قابل للتحويل — استخدمه كنص
}

  if(type==='select-status'){
    const opts=Object.entries(LABELS).map(([k,v])=>`<option value="${k}"${k===val?' selected':''}>${v}</option>`).join('');
    return `<div class="dp-form-group dp-item"><label class="dp-form-label">${escapeHtml(label)}</label><select class="dp-form-select" id="edit_${field}">${opts}</select></div>`;
  }
  // الحقول التي تبدأ بـ date_ تستخدم date picker تلقائياً
  if(!type&&field&&field.startsWith('date_')){
    return `<div class="dp-form-group dp-item"><label class="dp-form-label">${escapeHtml(label)}</label><input class="dp-form-input" type="date" id="edit_${field}" value="${escapeHtml(_toIsoDate(val))}"></div>`;

  return `<div class="dp-form-group dp-item"><label class="dp-form-label">${escapeHtml(label)}</label><input class="dp-form-input" type="${t}" id="edit_${field}" value="${escapeHtml(val)}"${t==='number'&&field==='progress'?' min="0" max="100"':''}></div>`;
}

function importExcel(input){
  if(_busy)return;
  const file=input.files[0]; if(!file) return;
  if(file.size>5*1024*1024){showAlert('حجم الملف كبير جداً (الحد الأقصى 5 ميجابايت)');input.value='';return;}
  // التحقق من امتداد الملف
  const validExt=/\.(xlsx|xls|csv)$/i.test(file.name);
  if(!validExt){showAlert('نوع الملف غير مدعوم. الرجاء استخدام xlsx أو xls أو csv');input.value='';return;}
  _busy=true;
  const reader=new FileReader();
  reader.onload=async function(e){
    // التحقق من magic bytes لتجنّب الملفات المتنكرة
    const buf=new Uint8Array(e.target.result);
    const isXlsx=buf.length>3&&buf[0]===0x50&&buf[1]===0x4B&&(buf[2]===0x03||buf[2]===0x05||buf[2]===0x07); // ZIP/PK
    const isXls=buf.length>7&&buf[0]===0xD0&&buf[1]===0xCF&&buf[2]===0x11&&buf[3]===0xE0; // OLE2
    const lowerName=file.name.toLowerCase();
    const isCsv=lowerName.endsWith('.csv');
    if(!isXlsx&&!isXls&&!isCsv){
      showAlert('محتوى الملف لا يتطابق مع نوع xlsx/xls/csv صالح');_busy=false;input.value='';return;
    }
    let wb;
    try{wb=XLSX.read(e.target.result,{type:'array'});}
    catch(err){console.error('xlsx parse',err);showAlert('تعذّر قراءة الملف. تأكد من صحته.');_busy=false;input.value='';return;}

    const oldByName={};projects.forEach(p=>{if(p.name)oldByName[p.name.trim()]=p;});
    const newByName={};parsed.forEach(p=>{if(p.name)newByName[p.name.trim()]=p;});
    const added=parsed.filter(p=>p.name&&!oldByName[p.name.trim()]);
    const removed=projects.filter(p=>p.name&&!newByName[p.name.trim()]);
    const modified=[];
    const compareKeys=['status','progress','value_num','contractor','pm','phase','date_end','date_end_adj','last_action','notes'];
    parsed.forEach(np=>{
      if(!np.name)return;
      const op=oldByName[np.name.trim()];
      if(!op)return;
      const changes=[];
      compareKeys.forEach(k=>{
        const ov=String(op[k]||''),nv=String(np[k]||'');
        if(ov!==nv)changes.push('  • '+k+': '+ov+' ← '+nv);
      });
      if(changes.length)modified.push({name:np.name,changes});
    });
    let summary='═══ ملخص الاستيراد ═══\n\n';
    summary+='المشاريع الحالية: '+projects.length+'\n';
    summary+='المشاريع في الملف: '+parsed.length+'\n\n';
    if(added.length){summary+='▸ مشاريع جديدة ('+added.length+'):\n';added.forEach(p=>{summary+='  + '+p.name+'\n';});summary+='\n';}
    if(removed.length){summary+='▸ مشاريع ستُحذف ('+removed.length+'):\n';removed.forEach(p=>{summary+='  - '+p.name+'\n';});summary+='\n';}
    if(modified.length){summary+='▸ مشاريع معدّلة ('+modified.length+'):\n';modified.forEach(m=>{summary+='  ✎ '+m.name+':\n'+m.changes.join('\n')+'\n';});summary+='\n';}
    if(!added.length&&!removed.length&&!modified.length)summary+='لا توجد تغييرات ملحوظة.\n';
    summary+='\n═══════════════════\nهل تريد المتابعة واستبدال جميع البيانات؟';
    if(!await showConfirm(summary,{title:'ملخص الاستيراد',okLabel:'متابعة واستبدال',danger:true})){_busy=false;return;}
    // ─── نسخة احتياطية محلية قبل الكتابة (في localStorage) — يمكن استرجاعها يدوياً ───
    try{
      const backupKey='projectsBackup_'+new Date().toISOString().replace(/[:.]/g,'-');
      localStorage.setItem(backupKey,JSON.stringify({savedAt:new Date().toISOString(),projects}));
      // الاحتفاظ بآخر 5 نسخ احتياطية فقط
      const allKeys=Object.keys(localStorage).filter(k=>k.startsWith('projectsBackup_')).sort();
      while(allKeys.length>5){const oldest=allKeys.shift();localStorage.removeItem(oldest);}
    }catch(e){console.warn('local backup failed',e);}
    try{
      const oldSnap=await getDocs(collection(db,'projects'));
      const delBatch=writeBatch(db);
      oldSnap.forEach(d=>delBatch.delete(d.ref));
      await delBatch.commit();
      const batch=writeBatch(db);
      parsed.forEach(p=>batch.set(doc(db,'projects',String(p.id)),{...p}));
      await batch.commit();
    }catch(e){console.error('importExcel-write',e);showAlert('تعذّر حفظ البيانات المستوردة. لم يتم تطبيق أي تغيير. تحقق من الاتصال والصلاحيات.');_busy=false;return;}
    projects=parsed;
    filter='all';
    updateLastModified();
    renderAll();
    showAlert('تم استيراد '+parsed.length+' مشروع بنجاح',' استيراد ناجح');
    _busy=false;
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function listLocalBackups(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('projectsBackup_')).sort().reverse();
  return keys.map(k=>{
    try{
      const data=JSON.parse(localStorage.getItem(k));
      if(!data||!Array.isArray(data.projects))return null;
      return {key:k,savedAt:data.savedAt||k.replace('projectsBackup_',''),count:data.projects.length};
    }catch(e){return null;}
  }).filter(Boolean);
}

async function restoreBackup(key){
  if(_busy)return;
  if(!currentUser||currentUser.role!=='admin')return;
  const raw=localStorage.getItem(key);
  if(!raw){showAlert('النسخة غير موجودة');return;}
  let data;
  try{data=JSON.parse(raw);}catch(e){showAlert('النسخة تالفة');return;}
  if(!data||!Array.isArray(data.projects)){showAlert('النسخة تالفة');return;}
  if(!await showConfirm('سيتم استبدال جميع المشاريع الحالية ('+projects.length+') بـ '+data.projects.length+' مشروع من النسخة المحفوظة بتاريخ:\n'+formatDateTime(data.savedAt)+'\n\nسيتم أخذ نسخة احتياطية للحالة الحالية أولاً. هل أنت متأكد؟',{title:'تأكيد الاسترجاع',okLabel:'استرجاع',danger:true}))return;
  _busy=true;
  // نسخة احتياطية محلية للحالة الحالية قبل الاسترجاع
  try{
    const newKey='projectsBackup_'+new Date().toISOString().replace(/[:.]/g,'-');
    localStorage.setItem(newKey,JSON.stringify({savedAt:new Date().toISOString(),projects}));
    const allKeys=Object.keys(localStorage).filter(k=>k.startsWith('projectsBackup_')).sort();
    while(allKeys.length>5){const oldest=allKeys.shift();localStorage.removeItem(oldest);}
  }catch(e){console.warn('pre-restore backup failed',e);}
  try{
    const oldSnap=await getDocs(collection(db,'projects'));
    const delBatch=writeBatch(db);
    oldSnap.forEach(d=>delBatch.delete(d.ref));
    await delBatch.commit();
    const batch=writeBatch(db);
    data.projects.forEach(p=>batch.set(doc(db,'projects',String(p.id)),{...p}));
    await batch.commit();
  }catch(e){console.error('restoreBackup',e);showAlert('تعذّر استرجاع النسخة. تحقق من الاتصال والصلاحيات.');_busy=false;return;}
  projects=data.projects.slice();
  filter='all';
  updateLastModified();
  closeDetail();
  renderAll();
  _busy=false;
  showAlert('تم استرجاع النسخة بنجاح','اكتمل الاسترجاع');
}

async function deleteBackup(key){
  if(!currentUser||currentUser.role!=='admin')return;
  if(!await showConfirm('حذف هذه النسخة الاحتياطية نهائياً؟ لا يمكن التراجع.',{title:'تأكيد الحذف',okLabel:'حذف',danger:true}))return;
  localStorage.removeItem(key);
  openBackupsManager();
}

window.toggleTheme=toggleTheme;

// ─── اختصارات الكيبورد ───
// Escape: إغلاق المودال، أو مسح البحث لو كان الحقل مركّزاً
// ← →: التنقل بين المشاريع عند فتح مشروع (RTL: → سابق، ← تالي)
document.addEventListener('keydown',function(e){
  const overlay=document.getElementById('detailOverlay');
  const overlayOpen=overlay&&overlay.classList.contains('open');
  const searchInput=document.getElementById('searchInput');
  const isTyping=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT');

  if(e.key==='Escape'){
    if(overlayOpen){e.preventDefault();closeDetail();return;}
    if(document.activeElement===searchInput&&searchInput.value){e.preventDefault();clearSearch();return;}
    return;
  }

  // أسهم التنقل بين المشاريع — تعمل فقط عند فتح مشروع وعدم الكتابة في حقل
  if((e.key==='ArrowLeft'||e.key==='ArrowRight')&&overlayOpen&&!isTyping&&_currentDetailId!=null){
    // تجاهل لو الشاشة المعروضة ليست تفاصيل مشروع (مثلاً شاشة إعدادات الطباعة)
    const panel=document.getElementById('detailPanel');
    if(!panel.querySelector('.dp-prog,.dp-grid'))return;
    // قائمة المشاريع المرئية حالياً (مصفّاة ومفروزة)
    let list=filter==='all'?[...projects]:projects.filter(p=>p.status===filter);
    if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.contractor||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)||(p.pm||'').toLowerCase().includes(q)||(p.contract_no||'').toLowerCase().includes(q));}
    if(sortBy!=='id'){list.sort((a,b)=>{let av=a[sortBy],bv=b[sortBy];if(sortBy==='date_end'){av=av||'';bv=bv||'';return sortDir*(av<bv?-1:av>bv?1:0);}return sortDir*((av||0)-(bv||0));});}
    const idx=list.findIndex(p=>p.id===_currentDetailId);
    if(idx<0)return;
    // في RTL: السهم الأيمن = السابق، الأيسر = التالي
    let newIdx;
    if(e.key==='ArrowRight')newIdx=idx-1;
    else newIdx=idx+1;
    if(newIdx>=0&&newIdx<list.length){e.preventDefault();openDetail(list[newIdx].id);}
  }
});

</script>
</body>
</html>
